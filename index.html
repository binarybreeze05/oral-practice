<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Oral practice — FR / EN</title>
<script>/* apply saved theme before paint to avoid flash */
  (function(){var t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme', t);})();
</script>
<link rel="stylesheet" href="style.css?v=2">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1f232a">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon-32.png" sizes="32x32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oral">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="side-head">
      <div class="side-top">
        <h1>Oral practice</h1>
        <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">☾</button>
      </div>
      <input id="search" type="search" placeholder="Search recordings…" autocomplete="off">
      <div id="count" class="count"></div>
    </div>
    <nav id="list"></nav>
  </aside>
  <main id="reader">
    <div id="empty" class="empty">Select a recording on the left.</div>
    <article id="entry" hidden>
      <div class="entry-head">
        <div class="entry-titlebar">
          <h2 id="entry-title"></h2>
          <span id="entry-date" class="date"></span>
        </div>
      </div>
      <div class="seg-head"><div>Français</div><div>English</div></div>
      <div id="segs"></div>
    </article>
  </main>
</div>
<footer id="bar">
  <div class="np"><span id="np-title">Nothing playing</span></div>
  <audio id="player" controls preload="none" playsinline></audio>
  <label class="cont" title="Play every recording back-to-back (commute mode)">
    <input type="checkbox" id="continuous"> 🔁 Continuous
  </label>
</footer>
<script src="data.js"></script>
<script src="app.js?v=2"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>
</body>
</html>
