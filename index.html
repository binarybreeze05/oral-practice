<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oral practice — FR / EN</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="side-head">
      <h1>Oral practice</h1>
      <input id="search" type="search" placeholder="Search recordings…" autocomplete="off">
      <div id="count" class="count"></div>
    </div>
    <nav id="list"></nav>
  </aside>
  <main id="reader">
    <div id="empty" class="empty">Select a recording on the left.</div>
    <article id="entry" hidden>
      <div class="entry-head">
        <div class="entry-titlebar">
          <h2 id="entry-title"></h2>
          <span id="entry-date" class="date"></span>
        </div>
      </div>
      <div class="seg-head"><div>Français</div><div>English</div></div>
      <div id="segs"></div>
    </article>
  </main>
</div>
<footer id="bar">
  <div class="np"><span id="np-title">Nothing playing</span></div>
  <audio id="player" controls preload="none" playsinline></audio>
  <label class="cont" title="Play every recording back-to-back (commute mode)">
    <input type="checkbox" id="continuous"> 🔁 Continuous
  </label>
</footer>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
